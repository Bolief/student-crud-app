<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Student CRUD App</a>
      <div>
        <a class="btn btn-outline-light me-2" href="/">Home</a>
        <a class="btn btn-outline-light" href="/students-page">Students</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow p-4 mb-4">
      <h2 class="mb-4">Student Form</h2>

      <form id="studentForm" class="row g-3">
        <input type="hidden" id="studentId" />

        <div class="col-md-4">
          <input type="text" id="name" class="form-control" placeholder="Student Name" required />
        </div>

        <div class="col-md-4">
          <input type="number" id="age" class="form-control" placeholder="Age" required />
        </div>

        <div class="col-md-4">
          <input type="text" id="course" class="form-control" placeholder="Course" required />
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-primary">Save Student</button>
        </div>
      </form>
    </div>

    <div class="card shadow p-4">
      <h2 class="mb-3">Student List</h2>

      <div class="table-responsive">
        <table class="table table-bordered table-striped text-center align-middle">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Age</th>
              <th>Course</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
